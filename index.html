<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hollowreach &mdash; a voxel sandbox</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- The 3D world renders here -->
  <canvas id="gl"></canvas>

  <!-- All 2D interface lives in this overlay layer -->
  <div id="ui">

    <!-- In-world heads up display -->
    <div id="hud" class="hidden">
      <div id="crosshair">+</div>
      <div id="break-overlay"></div>
      <div id="hud-bottom">
        <div id="stats">
          <div id="breath"></div>
          <div id="bars"><div id="hearts"></div><div id="hunger"></div></div>
        </div>
        <div id="hotbar"></div>
      </div>
      <div id="held-item-label"></div>
      <div id="debug" class="hidden"></div>
    </div>

    <!-- Main menu / world select / about -->
    <div id="menu" class="screen menu-screen">
      <div class="menu-card menu-glass">
        <div class="brand">
          <h1 class="game-title">HOLLOWREACH</h1>
          <p class="subtitle">a vibecoded voxel sandbox</p>
        </div>
        <div id="menu-root"></div>
      </div>
      <div class="menu-footer">
        <span class="version-tag"></span>
        <span class="menu-sig">Built from scratch in WebGL2 — no engine, no libraries</span>
      </div>
    </div>

    <!-- Pause menu -->
    <div id="pause" class="screen hidden">
      <div class="menu-card">
        <h2>Paused</h2>
        <div id="pause-root"></div>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings" class="screen hidden">
      <div class="menu-card wide">
        <h2>Settings</h2>
        <div id="settings-root"></div>
        <div class="row end">
          <button id="settings-back" class="btn">Back</button>
        </div>
      </div>
    </div>

    <!-- Inventory + crafting overlay -->
    <div id="inventory" class="screen dim hidden">
      <div id="inventory-root"></div>
    </div>

    <!-- Recipe browser (auto-generated from the recipe tables) -->
    <div id="recipebook" class="screen dim hidden">
      <div class="menu-card wide rb-window">
        <h2>Recipe Book</h2>
        <div id="recipebook-root"></div>
        <div class="row end"><button id="recipebook-back" class="btn small">Close</button></div>
      </div>
    </div>

    <!-- Screenshot / panorama gallery -->
    <div id="gallery" class="screen dim hidden">
      <div class="menu-card wide gal-window">
        <h2>Gallery</h2>
        <div id="gallery-root"></div>
        <div class="row end"><button id="gallery-back" class="btn small">Close</button></div>
      </div>
    </div>

    <!-- transient toast messages -->
    <div id="notify"></div>

    <!-- floating item that follows the cursor while moving stacks -->
    <div id="held-stack" class="hidden"></div>

    <!-- boot / unsupported message -->
    <div id="boot" class="screen">
      <div class="menu-card"><h2>Loading&hellip;</h2></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
